<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Factory Laser – Personalizador de Virola</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Factory Laser</h1>
  <p>Previsualizá tu grabado en la virola</p>

  <div class="contenedor">

    <svg id="preview" viewBox="0 0 400 400">

      <!-- ÚNICO aro gris (virola) -->
      <circle
        cx="200"
        cy="200"
        r="170"
        fill="none"
        stroke="#cfcfcf"
        stroke-width="18"
      />

      <!-- Path invisible para guiar el texto -->
      <defs>
        <path
          id="textoCircular"
          d="
            M 200,200
            m -150,0
            a 150,150 0 1,1 300,0
            a 150,150 0 1,1 -300,0
          "
        />
      </defs>

      <!-- Texto circular -->
      <text font-size="26" fill="#000" dy="6">
        <textPath
          id="textoPreview"
          href="#textoCircular"
          startOffset="50%"
          text-anchor="middle"
        >
          TU TEXTO ACÁ
        </textPath>
      </text>

    </svg>

    <div class="controles">
      <label>Texto a grabar</label>
      <input
        type="text"
        id="textoInput"
        placeholder="Escribí tu texto"
        maxlength="60"
      />
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
