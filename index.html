<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Factory Laser | Estación de Grabado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Factory Laser</h1>
<p class="subtitle">Estación de Grabado de Virola</p>

<div class="editor">
  <div class="preview" id="preview"></div>

  <div class="controls">
    <label>Texto a grabar</label>
    <input type="text" id="texto" placeholder="Ej: Juan 2025">

    <label>Tipografía</label>
    <select id="fuente">
      <option value="Arial">Arial</option>
      <option value="Georgia">Georgia</option>
      <option value="Courier New">Courier</option>
      <option value="Times New Roman">Times</option>
    </select>

    <label>Tamaño</label>
    <input type="range" id="tamano" min="20" max="45" value="32">

    <button onclick="descargarSVG()">Descargar diseño</button>
  </div>
</div>

<p class="nota">
  Todos los diseños son revisados antes de grabar.
</p>

<script src="script.js"></script>
</body>
</html>
