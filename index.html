<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Factory Laser – Personalizador de Virola</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Factory Laser</h1>
  <p>Previsualizá tu grabado en la virola</p>

  <div class="contenedor">

    <svg id="preview" viewBox="0 0 420 420">

      <!-- Contorno negro exterior -->
      <circle cx="210" cy="210" r="160" fill="none" stroke="#000000" stroke-width="2" />

      <!-- Contorno negro interior -->
      <circle cx="210" cy="210" r="140" fill="none" stroke="#000000" stroke-width="2" />

      <!-- Aro gris grueso -->
      <circle cx="210" cy="210" r="150" fill="none" stroke="#cfcfcf" stroke-width="35" />

      <!-- Path invisible para texto -->
      <defs>
        <path
          id="textoCircular"
          d="
            M 210,210
            m -150,0
            a 150,150 0 1,1 300,0
            a 150,150 0 1,1 -300,0
          "
        />
      </defs>

      <!-- Texto circular centrado -->
      <text font-size="26" fill="#000" dominant-baseline="middle" dy="2" id="textoPreview">
        <textPath href="#textoCircular" startOffset="50%" text-anchor="middle">
          TU TEXTO ACÁ
        </textPath>
      </text>

    </svg>

    <div class="controles">
      <label>Texto a grabar</label>
      <input type="text" id="textoInput" placeholder="Escribí tu texto" maxlength="60" />

      <label>Dirección del texto</label>
      <button id="invertirBtn">Invertir</button>

      <label>Tamaño de letra</label>
      <input type="number" id="tamanoInput" value="26" min="10" max="60" />

      <label>Tipo de fuente</label>
      <select id="fuenteSelect">
        <option value="Arial" selected>Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
      </select>
    </div>

  </div>

  <script>
    const textoInput = document.getElementById('textoInput');
    const textoPreview = document.getElementById('textoPreview');
    const invertirBtn = document.getElementById('invertirBtn');
    const tamanoInput = document.getElementById('tamanoInput');
    const fuenteSelect = document.getElementById('fuenteSelect');

    let invertido = false;

    // Actualiza el texto en tiempo real
    textoInput.addEventListener('input', () => {
      textoPreview.textContent = textoInput.value || 'TU TEXTO ACÁ';
    });

    // Botón para invertir dirección
    invertirBtn.addEventListener('click', () => {
      invertido = !invertido;
      const path = document.getElementById('textoCircular');
      path.setAttribute('transform', invertido ? 'scale(-1,1) translate(-420,0)' : '');
    });

    // Cambiar tamaño de letra
    tamanoInput.addEventListener('input', () => {
      textoPreview.setAttribute('font-size', tamanoInput.value);
    });

    // Cambiar tipo de fuente
    fuenteSelect.addEventListener('change', () => {
      textoPreview.setAttribute('font-family', fuenteSelect.value);
    });
  </script>

</body>
</html>
