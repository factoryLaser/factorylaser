<svg id="virolaSVG" viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Cuerpo de la virola -->
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bfc1c3"/>
      <stop offset="50%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#bfc1c3"/>
    </linearGradient>
  </defs>

  <rect x="10" y="20" width="580" height="100" rx="50" fill="url(#steel)" />

  <!-- Área de grabado (referencia visual) -->
  <rect x="120" y="45" width="360" height="50" rx="25"
        fill="none" stroke="#888" stroke-dasharray="6 6"/>

  <!-- Texto grabado -->
  <text id="grabadoTexto"
        x="300"
        y="80"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="32"
        fill="#222"
        font-family="Arial">
    TU TEXTO
  </text>
</svg>
